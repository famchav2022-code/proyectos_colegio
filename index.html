<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Proyectos Académicos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    .header {
      padding: 30px 20px 10px;
    }

    .logo-box {
      background: white;
      display: inline-block;
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .logo-box img {
      width: 100px;
    }

    h1 {
      font-size: 26px;
      letter-spacing: 2px;
      margin: 10px 0 5px;
    }

    .sub {
      font-size: 14px;
      opacity: 0.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      padding: 30px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 20px;
      text-align: left;
      position: relative;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 0 30px rgba(0,255,200,0.4);
    }

    .icon {
      font-size: 40px;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      margin-top: 10px;
    }

    .desc {
      font-size: 14px;
      opacity: 0.8;
      margin: 10px 0 15px;
    }

    .btn {
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }

    .activo {
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
    }

    .activo:hover {
      background: linear-gradient(45deg, #00eaff, #005eff);
    }

    .cerrado-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .cerrado {
      filter: grayscale(100%);
    }

    footer {
      margin: 20px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="logo-box">
    <img src="LOGO_PARADISE.png">
  </div>

  <h1>PROYECTOS ACADÉMICOS</h1>
  <div class="sub">Explora, participa y crea tu futuro</div>
</div>

<div class="grid" id="contenedor"></div>

<footer>
  Paradise International School © 2026
</footer>

<script>
let iconos = {
  "EUREKA": "🔬",
  "JUNIOR RESEARCH": "📚",
  "CANGURO MATEMÁTICO": "🧮",
  "PRE-U": "🎓"
};

fetch("config.json")
  .then(res => res.json())
  .then(data => mostrar(data));

function mostrar(lista) {
  let html = "";

  lista.forEach(p => {

    let activo = p.activo;
    let icono = iconos[p.nombre] || "📌";

    html += `
      <div class="card ${activo ? "" : "cerrado"}">

        <div class="icon">${icono}</div>

        <div class="title">${p.nombre}</div>

        <div class="desc">${p.descripcion}</div>

        ${
          activo
            ? `<button class="btn activo" onclick="window.open('${p.url}','_blank')">INGRESAR</button>`
            : `<button class="btn" disabled>NO DISPONIBLE</button>`
        }

        ${!activo ? `<div class="cerrado-overlay">CERRADO</div>` : ""}

      </div>
    `;
  });

  document.getElementById("contenedor").innerHTML = html;
}
</script>

</body>
</html>
