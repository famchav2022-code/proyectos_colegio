<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Proyectos Académicos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      margin: 0;
      padding: 20px;
      color: white;
      text-align: center;
    }

    .header img {
      width: 120px;
      margin-bottom: 10px;
    }

    h1 {
      margin-bottom: 30px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 320px);
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: white;
      color: #333;
      border-radius: 15px;
      padding: 20px;
      text-align: left;
      box-shadow: 0px 6px 15px rgba(0,0,0,0.2);
      transition: 0.3s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .icon {
      font-size: 30px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin: 10px 0;
    }

    .desc {
      font-size: 14px;
      color: #555;
      margin-bottom: 15px;
    }

    .btn {
      padding: 8px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-activo {
      background: #28a745;
      color: white;
    }

    .btn-activo:hover {
      background: #218838;
    }

    .cerrado {
      filter: grayscale(100%);
      opacity: 0.7;
    }

    .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: red;
      color: white;
      padding: 5px 10px;
      border-radius: 10px;
      font-size: 12px;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="header">
  <img src="LOGO_PARADISE.png">
  <h1>PROYECTOS ACADÉMICOS</h1>
</div>

<div class="grid" id="contenedor"></div>

<script>
let iconos = {
  "EUREKA": "🔬",
  "JUNIOR RESEARCH": "📘",
  "CANGURO MATEMÁTICO": "🧮",
  "PRE-U": "🎓"
};

fetch("config.json")
  .then(res => res.json())
  .then(data => {
    mostrar(data);
  });

function mostrar(lista) {
  let html = "";

  lista.forEach(p => {

    let activo = p.activo;
    let icono = iconos[p.nombre] || "📌";

    html += `
      <div class="card ${activo ? "" : "cerrado"}">

        ${!activo ? `<div class="badge">CERRADO</div>` : ""}

        <div class="icon">${icono}</div>

        <div class="title">${p.nombre}</div>

        <div class="desc">${p.descripcion || ""}</div>

        ${
          activo
            ? `<button class="btn btn-activo" onclick="window.open('${p.url}','_blank')">Ingresar</button>`
            : `<button class="btn" disabled>Disponible pronto</button>`
        }

      </div>
    `;
  });

  document.getElementById("contenedor").innerHTML = html;
}
</script>

</body>
</html>
